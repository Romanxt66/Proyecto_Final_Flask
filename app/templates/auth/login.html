{% extends 'base.html' %}
{% block title %}Iniciar Sesión — SENA Prácticas{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-card-header">
      <div class="login-logo">
        <i class="bi bi-box-arrow-in-right"></i>
      </div>
      <h1>Bienvenido de nuevo</h1>
      <p>Ingresa a tu cuenta para continuar</p>
    </div>
    <div class="login-card-body">
      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
          <label class="form-label" for="correo">Correo Electrónico</label>
          <div class="input-icon-wrap">
            <i class="bi bi-envelope"></i>
            <input class="form-control" type="email" id="correo" name="correo" placeholder="usuario@soy.sena.edu.co" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-icon-wrap">
            <i class="bi bi-lock"></i>
            <input class="form-control" type="password" id="password" name="password" placeholder="••••••••" required>
          </div>
        </div>
        <button class="btn btn-primary w-100 py-2 mb-3" type="submit">
          Ingresar
        </button>
        <div class="text-center">
          <a href="{{ url_for('auth.registro') }}" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none;">
            ¿No tienes cuenta? <span style="color:var(--accent-cyan);">Regístrate aquí</span>
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
